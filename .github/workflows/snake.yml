name: Generate Snake Contibution Grid

on:
  workflow_dispatch:

  schedule:
    - cron: '0 */12 * * *'

jobs:
  build:
    name: Job to update svg
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate snake animation
        run: |
          npm install generate-snake-animation@3.5.0

          cat > generate-snake.mjs << 'SCRIPT_EOF'
          import * as fs from 'node:fs';

          // Intercept the GitHub GraphQL contributionsCollection call and serve data
          // from the public HTML contributions page instead, which has no resource limits.
          const _fetch = globalThis.fetch;
          const levelToStr = (l) =>
            ['NONE', 'FIRST_QUARTILE', 'SECOND_QUARTILE', 'THIRD_QUARTILE', 'FOURTH_QUARTILE'][l] || 'NONE';

          globalThis.fetch = async (url, init) => {
            if (
              typeof url === 'string' &&
              url.includes('/graphql') &&
              init?.method === 'POST'
            ) {
              try {
                const body = JSON.parse(init.body);
                if (body?.query?.includes('contributionsCollection')) {
                  const username = body.variables?.login;

                  // Fetch from GitHub's public HTML contributions endpoint (no resource limits)
                  const htmlRes = await _fetch(
                    `https://github.com/users/${username}/contributions`,
                    { headers: { 'User-Agent': 'snake-animation-generator' } }
                  );
                  if (!htmlRes.ok) throw new Error(`HTML fetch failed: ${htmlRes.status}`);
                  const html = await htmlRes.text();

                  // Parse contribution cells from HTML attributes
                  const cells = [];
                  const re = /data-date="(\d{4}-\d{2}-\d{2})"[^>]*data-level="(\d)"/g;
                  let m;
                  while ((m = re.exec(html)) !== null)
                    cells.push({ date: m[1], level: Number(m[2]) });

                  if (cells.length === 0) throw new Error('No contribution cells found in HTML');

                  // Group by week, computing weekday from date.
                  // Use UTC arithmetic throughout to avoid DST issues.
                  const [oy, om, od] = cells[0].date.split('-').map(Number);
                  const originMs = Date.UTC(oy, om - 1, od);
                  const weekMap = new Map();
                  for (const { date, level } of cells) {
                    const [y, mo, day] = date.split('-').map(Number);
                    const dayMs = Date.UTC(y, mo - 1, day);
                    const days = (dayMs - originMs) / 86400_000;
                    const weekIdx = Math.floor(days / 7);
                    const d = new Date(dayMs);
                    if (!weekMap.has(weekIdx)) weekMap.set(weekIdx, []);
                    weekMap.get(weekIdx).push({
                      contributionCount: level,
                      contributionLevel: levelToStr(level),
                      weekday: d.getUTCDay(),
                      date,
                    });
                  }

                  const weeks = [...weekMap.entries()]
                    .sort(([a], [b]) => a - b)
                    .map(([, contributionDays]) => ({ contributionDays }));

                  return new Response(
                    JSON.stringify({
                      data: {
                        user: {
                          contributionsCollection: {
                            contributionCalendar: { weeks },
                          },
                        },
                      },
                    }),
                    { status: 200, headers: { 'Content-Type': 'application/json' } }
                  );
                }
              } catch (err) {
                console.error('HTML contributions fetch failed, falling back to GraphQL:', err.message);
              }
            }
            return _fetch(url, init);
          };

          const { generateSnakeAnimation } = await import('generate-snake-animation');

          const results = await generateSnakeAnimation(
            {
              platform: 'github',
              username: 'zoispag',
              githubToken: process.env.GITHUB_TOKEN,
            },
            [
              {
                filename: 'dist/github-contribution-grid-snake.svg',
                format: 'svg',
                drawOptions: {
                  colorBackground: '#ffffff',
                  colorDotBorder: '#1b1f230a',
                  colorDots: ['#ebedf0', '#9be9a8', '#40c463', '#30a14e', '#216e39'],
                  colorEmpty: '#ebedf0',
                  colorSnake: 'purple',
                  sizeDotBorderRadius: 2,
                  sizeCell: 16,
                  sizeDot: 12,
                },
                animationOptions: { stepDurationMs: 100, frameByStep: 1 },
              },
            ]
          );

          fs.mkdirSync('dist', { recursive: true });
          if (!results[0]) throw new Error('No SVG output generated');
          fs.writeFileSync('dist/github-contribution-grid-snake.svg', results[0]);
          console.log('Snake animation generated successfully');
          SCRIPT_EOF

          node generate-snake.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

